<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xiroro | Panel Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Poppins', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(56, 189, 248, 0.2); }
        .swal2-popup { background: #1e293b !important; color: white !important; }
        .swal2-input { background: #0f172a !important; color: white !important; border: 1px solid #38bdf8 !important; }
        input, textarea { background-color: #0f172a; border: 1px solid #334155; color: white; padding: 0.75rem; border-radius: 0.5rem; width: 100%; transition: all 0.3s; }
        input:focus, textarea:focus { border-color: #38bdf8; outline: none; box-shadow: 0 0 10px rgba(56,189,248,0.2); }
        label { font-size: 0.875rem; font-weight: 600; color: #94a3b8; margin-bottom: 0.25rem; display: block; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
            <div>
                <h1 class="text-3xl font-bold text-cyan-400"><i class="fa-solid fa-screwdriver-wrench"></i> Xiroro Admin</h1>
                <p class="text-sm text-slate-400 mt-1">Kelola Script Premium & Gratis Anda di sini.</p>
            </div>
            <div class="flex gap-3">
                <a href="index.html" target="_blank" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg transition"><i class="fa-solid fa-eye"></i> Web Premium</a>
                <a href="gratis.html" target="_blank" class="bg-emerald-700 hover:bg-emerald-600 text-white px-4 py-2 rounded-lg transition"><i class="fa-solid fa-eye"></i> Web Gratis</a>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="glass p-6 rounded-xl h-fit lg:sticky lg:top-6">
                <h2 id="formTitle" class="text-xl font-bold text-white mb-6 border-b border-slate-700 pb-2">Tambah Script Baru</h2>
                
                <input type="hidden" id="docId">
                
                <div class="space-y-4">
                    <div>
                        <label>Nama Script / Mod</label>
                        <input type="text" id="nama" placeholder="Contoh: Script Skin Alucard Epic">
                    </div>
                    
                    <div>
                        <label>Deskripsi Fitur</label>
                        <textarea id="deskripsi" rows="4" placeholder="Detail mod, anti ban, dll..."></textarea>
                    </div>
                    
                    <div>
                        <label>Harga (Rp) <span class="text-emerald-400 ml-1 font-normal">*Isi 0 untuk Web Gratis</span></label>
                        <input type="number" id="harga" placeholder="30000 (Tanpa titik)">
                    </div>
                    
                    <div>
                        <label>Link Gambar / Thumbnail</label>
                        <input type="text" id="gambarUrl" placeholder="https://... atau Link Google Drive">
                    </div>
                    
                    <div>
                        <label>ID Video YouTube <span class="text-slate-500 font-normal">(Opsional)</span></label>
                        <input type="text" id="videoID" placeholder="Contoh: dQw4w9WgXcQ">
                    </div>
                    
                    <div>
                        <label>Link SociaBuzz / Shortlink SafelinkU</label>
                        <input type="text" id="fileLink" placeholder="Masukkan link checkout atau download">
                    </div>

                    <div class="flex gap-2 pt-4">
                        <button onclick="simpanData()" class="flex-1 bg-cyan-600 hover:bg-cyan-500 text-white py-3 rounded-lg font-bold transition shadow-lg shadow-cyan-900/50">
                            <i class="fa-solid fa-save"></i> Simpan Data
                        </button>
                        <button onclick="resetForm()" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-3 rounded-lg transition" title="Batal Edit">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 glass p-6 rounded-xl overflow-hidden flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-white">Daftar Etalase</h2>
                    <button onclick="muatData()" class="text-cyan-400 hover:text-white transition"><i class="fa-solid fa-rotate-right"></i> Refresh</button>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-800 text-slate-300 text-sm">
                                <th class="p-3 rounded-tl-lg">Produk</th>
                                <th class="p-3">Tipe / Harga</th>
                                <th class="p-3 text-center">Statistik</th>
                                <th class="p-3 text-center rounded-tr-lg">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tabelProduk" class="text-sm divide-y divide-slate-700/50">
                            <tr><td colspan="4" class="text-center py-8 text-slate-400"><i class="fa-solid fa-circle-notch fa-spin"></i> Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
        </div>
    </div>

    <script>
        // INISIALISASI FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAXfLH19B6nQkEwUwnDoA2C-Nh5DQhwEIo",
            authDomain: "toko-mod-mlbb.firebaseapp.com",
            projectId: "toko-mod-mlbb",
            storageBucket: "toko-mod-mlbb.firebasestorage.app",
            messagingSenderId: "814354818916",
            appId: "1:814354818916:web:452a04732f528abdec7c71"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // MUAT DATA SAAT HALAMAN DIBUKA
        document.addEventListener("DOMContentLoaded", muatData);

        function muatData() {
            const tbody = document.getElementById('tabelProduk');
            tbody.innerHTML = `<tr><td colspan="4" class="text-center py-8 text-slate-400"><i class="fa-solid fa-circle-notch fa-spin"></i> Sedang mengambil data...</td></tr>`;
            
            db.collection("script").orderBy("createTime", "desc").get().then((querySnapshot) => {
                tbody.innerHTML = "";
                if (querySnapshot.empty) {
                    tbody.innerHTML = `<tr><td colspan="4" class="text-center py-8 text-slate-500">Belum ada produk di database.</td></tr>`;
                    return;
                }

                querySnapshot.forEach((doc) => {
                    let d = doc.data();
                    let id = doc.id;
                    let hargaNum = parseInt(d.harga) || 0;
                    
                    // Logika Label
                    let labelTipe = hargaNum > 0 
                        ? `<span class="bg-cyan-900/50 text-cyan-400 px-2 py-1 rounded text-xs border border-cyan-700/50">Rp ${hargaNum.toLocaleString('id-ID')}</span>`
                        : `<span class="bg-emerald-900/50 text-emerald-400 px-2 py-1 rounded text-xs border border-emerald-700/50">GRATIS</span>`;

                    let views = d.views || 0;
                    let terjual = d.terjual || 0;

                    // Mengamankan data dari tanda kutip saat di passing ke fungsi
                    let safeData = encodeURIComponent(JSON.stringify({id: id, ...d}));

                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-800/50 transition">
                            <td class="p-3">
                                <div class="font-bold text-white truncate max-w-[200px]">${d.nama}</div>
                                <div class="text-xs text-slate-500 truncate max-w-[200px]" title="${d.fileLink}">${d.fileLink || '-'}</div>
                            </td>
                            <td class="p-3">${labelTipe}</td>
                            <td class="p-3 text-center text-xs">
                                <div class="text-slate-300 mb-1"><i class="fa-solid fa-eye text-cyan-500"></i> ${views}</div>
                                <div class="text-orange-300 font-bold cursor-pointer hover:text-orange-400" onclick="editAngkaTerjual('${id}', ${terjual}, '${d.nama}')" title="Klik untuk ubah manual">
                                    <i class="fa-solid fa-cart-arrow-down"></i> ${terjual} <i class="fa-solid fa-pen text-[10px] ml-1"></i>
                                </div>
                            </td>
                            <td class="p-3 text-center">
                                <div class="flex justify-center gap-2">
                                    <button onclick="siapkanEdit('${safeData}')" class="bg-blue-600/20 text-blue-400 hover:bg-blue-600 hover:text-white w-8 h-8 rounded transition"><i class="fa-solid fa-pen"></i></button>
                                    <button onclick="hapusData('${id}', '${d.nama}')" class="bg-red-600/20 text-red-400 hover:bg-red-600 hover:text-white w-8 h-8 rounded transition"><i class="fa-solid fa-trash"></i></button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            }).catch(error => {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-8 text-red-400">Error: ${error.message}</td></tr>`;
            });
        }

        // FUNGSI SIMPAN (TAMBAH / EDIT)
        function simpanData() {
            let id = document.getElementById("docId").value;
            let data = {
                nama: document.getElementById("nama").value.trim(),
                deskripsi: document.getElementById("deskripsi").value.trim(),
                // Disimpan sebagai string agar kompatibel dengan sistem index.html Anda sebelumnya
                harga: document.getElementById("harga").value.toString(), 
                gambarUrl: document.getElementById("gambarUrl").value.trim(),
                videoID: document.getElementById("videoID").value.trim(),
                fileLink: document.getElementById("fileLink").value.trim()
            };

            if (!data.nama || !data.harga || !data.fileLink) {
                Swal.fire({ icon: 'warning', title: 'Oops...', text: 'Nama, Harga, dan Link wajib diisi!' });
                return;
            }

            Swal.fire({ title: 'Menyimpan...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

            if (id) {
                // UPDATE DATA EKSISTING
                db.collection("script").doc(id).update(data).then(() => {
                    Swal.fire({ icon: 'success', title: 'Berhasil', text: 'Produk diperbarui.', timer: 1500, showConfirmButton: false });
                    resetForm();
                    muatData();
                }).catch(err => Swal.fire('Error', err.message, 'error'));
            } else {
                // TAMBAH DATA BARU
                data.createTime = new Date().toISOString();
                data.views = 0;
                data.terjual = 0;
                
                db.collection("script").add(data).then(() => {
                    Swal.fire({ icon: 'success', title: 'Berhasil', text: 'Produk ditambahkan.', timer: 1500, showConfirmButton: false });
                    resetForm();
                    muatData();
                }).catch(err => Swal.fire('Error', err.message, 'error'));
            }
        }

        function siapkanEdit(safeDataString) {
            let data = JSON.parse(decodeURIComponent(safeDataString));
            document.getElementById("formTitle").innerHTML = "<span class='text-blue-400'>Edit Script:</span> " + data.nama;
            document.getElementById("docId").value = data.id;
            document.getElementById("nama").value = data.nama;
            document.getElementById("deskripsi").value = data.deskripsi || '';
            document.getElementById("harga").value = data.harga || '0';
            document.getElementById("gambarUrl").value = data.gambarUrl || '';
            document.getElementById("videoID").value = data.videoID || '';
            document.getElementById("fileLink").value = data.fileLink || '';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById("formTitle").innerText = "Tambah Script Baru";
            document.getElementById("docId").value = "";
            document.getElementById("nama").value = "";
            document.getElementById("deskripsi").value = "";
            document.getElementById("harga").value = "";
            document.getElementById("gambarUrl").value = "";
            document.getElementById("videoID").value = "";
            document.getElementById("fileLink").value = "";
        }

        function hapusData(id, nama) {
            Swal.fire({
                title: 'Hapus Produk?',
                text: `Anda yakin ingin menghapus "${nama}"?`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#334155',
                confirmButtonText: 'Ya, Hapus!'
            }).then((result) => {
                if (result.isConfirmed) {
                    db.collection("script").doc(id).delete().then(() => {
                        Swal.fire({ icon: 'success', title: 'Terhapus', timer: 1000, showConfirmButton: false });
                        muatData();
                    });
                }
            });
        }

        // FITUR BARU: UPDATE MANUAL ANGKA DICHECKOUT/TERJUAL
        function editAngkaTerjual(id, currentVal, nama) {
            Swal.fire({
                title: 'Ubah Angka Dicheckout',
                text: `Produk: ${nama}`,
                input: 'number',
                inputValue: currentVal,
                showCancelButton: true,
                confirmButtonText: 'Update Angka',
                cancelButtonText: 'Batal',
                inputValidator: (value) => {
                    if (!value || value < 0) return 'Angka tidak boleh kosong atau negatif!'
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    let newTerjual = parseInt(result.value);
                    db.collection("script").doc(id).update({
                        terjual: newTerjual
                    }).then(() => {
                        Swal.fire({ icon: 'success', title: 'Diupdate!', text: `Angka dicheckout menjadi ${newTerjual}`, timer: 1500, showConfirmButton: false });
                        muatData();
                    });
                }
            });
        }
    </script>
</body>
</html>
