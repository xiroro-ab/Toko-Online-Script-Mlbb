<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin Xiroro Script</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .tab-active { border-bottom: 2px solid #22d3ee; color: #22d3ee; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="areaLogin" class="max-w-md mx-auto mt-20 glass p-8 rounded-2xl shadow-2xl border-t-4 border-t-cyan-500">
        <div class="text-center mb-8">
            <i class="fa-solid fa-user-shield text-5xl text-cyan-400 mb-4"></i>
            <h2 class="text-2xl font-bold">Admin Login</h2>
            <p class="text-slate-400 text-sm mt-2">Masuk untuk mengelola toko Xiroro</p>
        </div>
        <div class="space-y-4">
            <input type="email" id="email" placeholder="Email Admin" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-lg focus:outline-cyan-500">
            <input type="password" id="password" placeholder="Password" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-lg focus:outline-cyan-500">
            <button onclick="loginAdmin()" class="w-full bg-cyan-600 hover:bg-cyan-500 py-3 rounded-lg font-bold transition mt-4"><i class="fa-solid fa-right-to-bracket"></i> Masuk</button>
        </div>
    </div>

    <div id="areaAdmin" class="max-w-6xl mx-auto" style="display: none;">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-bold text-cyan-400"><i class="fa-solid fa-gauge-high"></i> Xiroro <span class="text-white">Control</span></h1>
            <button onclick="logoutAdmin()" class="text-red-400 hover:text-red-300 font-medium"><i class="fa-solid fa-power-off"></i> Keluar</button>
        </header>

        <div class="flex gap-8 border-b border-slate-700 mb-8">
            <button onclick="switchTab('produk')" id="btn-produk" class="pb-4 tab-active font-medium">Manajemen Produk</button>
            <button onclick="switchTab('tampilan')" id="btn-tampilan" class="pb-4 text-slate-400 font-medium">Pengaturan Etalase</button>
        </div>

        <section id="section-produk" class="block">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <div class="glass p-6 rounded-2xl h-fit">
                    <h2 id="form-title" class="text-xl font-bold mb-6 text-cyan-400"><i class="fa-solid fa-plus"></i> Tambah Produk Baru</h2>
                    <form id="form-produk" onsubmit="simpanProduk(event)" class="space-y-4">
                        <input type="hidden" id="edit-id"> <input type="hidden" id="gambarUrlLama"> 
                        <div>
                            <label class="block text-sm mb-1 text-slate-400">Nama Produk</label>
                            <input type="text" id="nama" placeholder="Misal: Script Skin Chou" class="w-full bg-slate-800 border border-slate-700 p-2 rounded-lg focus:outline-cyan-500" required>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm mb-1 text-slate-400">Harga (Rp)</label>
                                <input type="number" id="harga" placeholder="Angka saja" class="w-full bg-slate-800 border border-slate-700 p-2 rounded-lg focus:outline-cyan-500" required>
                            </div>
                            <div>
                                <label class="block text-sm mb-1 text-slate-400">YouTube ID (Opsional)</label>
                                <input type="text" id="videoID" placeholder="Contoh: dQw4w9WgXcQ" class="w-full bg-slate-800 border border-slate-700 p-2 rounded-lg focus:outline-cyan-500">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm mb-1 text-slate-400">Deskripsi Singkat</label>
                            <textarea id="deskripsi" placeholder="Deskripsi mod..." class="w-full bg-slate-800 border border-slate-700 p-2 rounded-lg h-20 focus:outline-cyan-500" required></textarea>
                        </div>
                        <div>
                            <label class="block text-sm mb-1 text-slate-400">Link File (Google Drive)</label>
                            <input type="text" id="fileLink" placeholder="Link download untuk pembeli" class="w-full bg-slate-800 border border-slate-700 p-2 rounded-lg focus:outline-cyan-500" required>
                        </div>
                        <div>
                            <label class="block text-sm mb-1 text-slate-400">Foto Produk</label>
                            <input type="file" id="foto" accept="image/*" class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-slate-700 file:text-cyan-400 hover:file:bg-slate-600">
                            <p id="info-foto" class="text-xs text-yellow-500 mt-1 hidden">Kosongkan jika tidak ingin mengganti foto lama.</p>
                        </div>
                        
                        <button type="submit" id="btn-submit" class="w-full bg-cyan-600 hover:bg-cyan-500 py-3 rounded-lg font-bold transition mt-4"><i class="fa-solid fa-cloud-arrow-up"></i> Simpan ke Etalase</button>
                        <button type="button" id="btn-cancel" onclick="resetForm()" class="w-full text-slate-400 hover:text-white mt-2 hidden">Batal Edit</button>
                    </form>
                </div>

                <div class="lg:col-span-2">
                    <div class="glass p-6 rounded-2xl">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-xl font-bold">Etalase Saat Ini</h2>
                            <button onclick="loadProduk()" class="text-cyan-400 hover:text-cyan-300 text-sm"><i class="fa-solid fa-rotate-right"></i> Refresh</button>
                        </div>
                        <div id="list-produk" class="space-y-4 max-h-[600px] overflow-y-auto pr-2" style="scrollbar-width: thin; scrollbar-color: #22d3ee #1e293b;">
                            </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="section-tampilan" class="hidden">
            <div class="glass p-8 rounded-2xl max-w-2xl border-t-4 border-t-purple-500">
                <h2 class="text-xl font-bold mb-6 text-purple-400"><i class="fa-solid fa-wand-magic-sparkles"></i> Pengaturan Website Pembeli</h2>
                <div class="space-y-6">
                    <div>
                        <label class="block mb-2 text-slate-300">URL Video Background (MP4 GitHub/Lokal)</label>
                        <input type="text" id="cfg-video" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-lg focus:outline-purple-500" placeholder="https://raw.githubusercontent.com/...">
                    </div>
                    <div>
                        <label class="block mb-2 text-slate-300">URL Logo Toko (PNG/JPG)</label>
                        <input type="text" id="cfg-logo" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-lg focus:outline-purple-500">
                    </div>
                    <div>
                        <label class="block mb-2 text-slate-300">Susunan Kolom Produk (Tampilan Komputer)</label>
                        <select id="cfg-kolom" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-lg focus:outline-purple-500">
                            <option value="grid-cols-2">2 Kolom (Besar)</option>
                            <option value="grid-cols-3">3 Kolom (Sedang)</option>
                            <option value="grid-cols-4">4 Kolom (Kecil/Padat)</option>
                        </select>
                    </div>
                    <button onclick="simpanConfig()" class="w-full bg-purple-600 hover:bg-purple-500 py-3 rounded-lg font-bold transition mt-4"><i class="fa-solid fa-floppy-disk"></i> Terapkan Tema ke Website</button>
                </div>
            </div>
        </section>
    </div>

    <script>
        // ==========================================
        // KUNCI FIREBASE ASLI ANDA
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAXfLH19B6nQkEwUwnDoA2C-Nh5DQhwEIo",
            authDomain: "toko-mod-mlbb.firebaseapp.com",
            projectId: "toko-mod-mlbb",
            storageBucket: "toko-mod-mlbb.firebasestorage.app",
            messagingSenderId: "814354818916",
            appId: "1:814354818916:web:452a04732f528abdec7c71",
            measurementId: "G-20KBWYYJXE"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // LINK GOOGLE APPS SCRIPT ANDA
        const appsScriptUrl = "https://script.google.com/macros/s/AKfycbyfBzWmShFfm00QdleoSpxhgwPeRmwhu-OSte6JZcuza1G9sIfmlXgdeSjV1BLgsqoj/exec";

        function loginAdmin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            Swal.fire({ title: 'Memeriksa Akses...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    Swal.close();
                    Swal.fire({ icon: 'success', title: 'Selamat Datang!', text: 'Login berhasil.', timer: 1500, showConfirmButton: false });
                    document.getElementById('areaLogin').style.display = 'none';
                    document.getElementById('areaAdmin').style.display = 'block';
                    loadProduk(); 
                    loadConfig(); 
                })
                .catch((error) => {
                    Swal.fire({ icon: 'error', title: 'Gagal Login', text: error.message });
                });
        }

        function logoutAdmin() {
            auth.signOut().then(() => {
                document.getElementById('areaLogin').style.display = 'block';
                document.getElementById('areaAdmin').style.display = 'none';
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
            });
        }

        function switchTab(tab) {
            document.getElementById('section-produk').classList.toggle('hidden', tab !== 'produk');
            document.getElementById('section-tampilan').classList.toggle('hidden', tab !== 'tampilan');
            document.getElementById('btn-produk').className = tab === 'produk' ? 'pb-4 tab-active font-medium' : 'pb-4 text-slate-400 hover:text-white font-medium';
            document.getElementById('btn-tampilan').className = tab === 'tampilan' ? 'pb-4 tab-active font-medium' : 'pb-4 text-slate-400 hover:text-white font-medium';
        }

        // ==========================================
        // FITUR BARU: SALIN LINK KHUSUS YOUTUBE
        // ==========================================
        function copyDirectLink(id) {
            let baseUrl = window.location.href.split('admin.html')[0];
            if (!baseUrl.endsWith('/')) baseUrl += '/';
            
            const directLink = baseUrl + "?id=" + id;
            
            navigator.clipboard.writeText(directLink).then(() => {
                Swal.fire({
                    icon: 'success',
                    title: 'Link Disalin!',
                    html: 'Link khusus produk ini siap ditempel di deskripsi YouTube:<br><br><code class="text-cyan-400 text-xs break-all">' + directLink + '</code>',
                    background: '#1e293b',
                    color: '#fff'
                });
            }).catch(() => {
                Swal.fire('Gagal', 'Tidak dapat menyalin link otomatis.', 'error');
            });
        }

        // ==========================================
        // CRUD: LOAD PRODUK DARI FIRESTORE
        // ==========================================
        async function loadProduk() {
            const list = document.getElementById('list-produk');
            list.innerHTML = '<div class="text-center text-cyan-400 py-4"><i class="fa-solid fa-spinner fa-spin fa-2x"></i></div>';

            try {
                const snapshot = await db.collection("script").get();
                list.innerHTML = "";
                
                if(snapshot.empty) {
                    list.innerHTML = "<p class='text-center text-slate-500'>Belum ada produk di etalase.</p>";
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const id = doc.id;
                    
                    let imgUrl = data.gambarUrl ? data.gambarUrl : "";
                    
                    if (imgUrl.includes("GAGAL_UPLOAD")) {
                        imgUrl = "https://dummyimage.com/150x150/1e293b/ef4444.png&text=Gagal+Upload";
                    } else if (imgUrl.includes("drive.google.com")) {
                        let fileId = "";
                        if (imgUrl.includes("/d/")) fileId = imgUrl.split("/d/")[1].split("/")[0];
                        else if (imgUrl.includes("id=")) fileId = imgUrl.split("id=")[1].split("&")[0];
                        if (fileId) imgUrl = "https://lh3.googleusercontent.com/d/" + fileId;
                    }
                    if (!imgUrl) imgUrl = "https://dummyimage.com/150x150/1e293b/22d3ee.png&text=Tanpa+Foto";

                    list.innerHTML += `
                        <div class="flex items-center justify-between p-4 bg-slate-800/80 rounded-xl border border-slate-700 hover:border-cyan-500/50 transition">
                            <div class="flex items-center gap-4 w-2/3">
                                <div class="w-14 h-14 bg-slate-900 rounded-lg overflow-hidden border border-slate-600 flex-shrink-0">
                                    <img src="${imgUrl}" class="w-full h-full object-cover" onerror="this.src='https://dummyimage.com/150x150/1e293b/ef4444.png&text=Error'">
                                </div>
                                <div class="overflow-hidden">
                                    <h4 class="font-bold text-white truncate">${data.nama}</h4>
                                    <p class="text-xs text-cyan-400 font-mono">Rp ${parseInt(data.harga).toLocaleString('id-ID')}</p>
                                </div>
                            </div>
                            <div class="flex gap-2 flex-shrink-0">
                                <button onclick="copyDirectLink('${id}')" class="w-10 h-10 bg-blue-600/80 rounded-lg hover:bg-blue-500 transition text-white" title="Salin Link untuk YouTube"><i class="fa-solid fa-link"></i></button>
                                
                                <button onclick="prepareEdit('${id}', \`${data.nama}\`, '${data.harga}', \`${data.deskripsi}\`, '${data.videoID || ''}', '${data.fileLink}', '${data.gambarUrl}')" class="w-10 h-10 bg-yellow-600/80 rounded-lg hover:bg-yellow-500 transition text-white" title="Edit Produk"><i class="fa-solid fa-pen"></i></button>
                                <button onclick="hapusProduk('${id}')" class="w-10 h-10 bg-red-600/80 rounded-lg hover:bg-red-500 transition text-white" title="Hapus Produk"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                list.innerHTML = `<p class='text-center text-red-500'>Gagal memuat data: ${error.message}</p>`;
            }
        }

        async function simpanProduk(e) {
            e.preventDefault(); 
            const btn = document.getElementById('btn-submit');
            const file = document.getElementById('foto').files[0];
            const editId = document.getElementById('edit-id').value;
            let imageUrl = document.getElementById('gambarUrlLama').value; 

            if (!editId && !file) {
                Swal.fire('Perhatian', 'Produk baru wajib menyertakan foto!', 'warning'); return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memproses...';

            try {
                if (file) {
                    btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up fa-bounce"></i> Mengupload Foto...';
                    const base64Data = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = (e) => resolve(e.target.result.split(',')[1]);
                        reader.readAsDataURL(file);
                    });

                    const response = await fetch(appsScriptUrl, {
                        method: "POST",
                        body: new URLSearchParams({ action: "upload", filename: file.name, mimetype: file.type, data: base64Data })
                    });
                    
                    imageUrl = await response.text(); 
                    
                    if (imageUrl.includes("GAGAL_UPLOAD")) {
                        Swal.fire({ icon: 'error', title: 'Upload Ditolak', text: imageUrl });
                        btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Simpan ke Etalase';
                        return; 
                    }
                }

                btn.innerHTML = '<i class="fa-solid fa-database fa-flip"></i> Menyimpan...';
                const dataToSave = {
                    nama: document.getElementById('nama').value,
                    harga: document.getElementById('harga').value.toString(),
                    deskripsi: document.getElementById('deskripsi').value,
                    videoID: document.getElementById('videoID').value,
                    fileLink: document.getElementById('fileLink').value,
                    gambarUrl: imageUrl
                };

                if (editId) {
                    await db.collection("script").doc(editId).update(dataToSave);
                    Swal.fire('Berhasil!', 'Produk telah di-update.', 'success');
                } else {
                    await db.collection("script").add(dataToSave);
                    Swal.fire('Berhasil!', 'Produk baru ditambahkan ke etalase.', 'success');
                }

                resetForm(); loadProduk(); 
            } catch (error) {
                Swal.fire('Gagal!', error.message, 'error');
                btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Simpan ke Etalase';
            }
        }

        function prepareEdit(id, nama, harga, deskripsi, video, fileLink, imgLama) {
            document.getElementById('form-title').innerHTML = "<i class='fa-solid fa-pen-to-square'></i> Edit Produk";
            document.getElementById('edit-id').value = id;
            document.getElementById('gambarUrlLama').value = imgLama; 
            document.getElementById('nama').value = nama;
            document.getElementById('harga').value = harga;
            document.getElementById('deskripsi').value = deskripsi;
            document.getElementById('videoID').value = video;
            document.getElementById('fileLink').value = fileLink;
            document.getElementById('foto').value = ''; 
            document.getElementById('info-foto').classList.remove('hidden'); 
            
            const btn = document.getElementById('btn-submit');
            btn.innerHTML = "<i class='fa-solid fa-check'></i> Update Produk";
            btn.classList.replace('bg-cyan-600', 'bg-yellow-600');
            btn.classList.replace('hover:bg-cyan-500', 'hover:bg-yellow-500');
            document.getElementById('btn-cancel').classList.remove('hidden');
        }

        function resetForm() {
            document.getElementById('form-produk').reset();
            document.getElementById('edit-id').value = "";
            document.getElementById('gambarUrlLama').value = "";
            document.getElementById('form-title').innerHTML = "<i class='fa-solid fa-plus'></i> Tambah Produk Baru";
            document.getElementById('info-foto').classList.add('hidden');
            
            const btn = document.getElementById('btn-submit');
            btn.disabled = false;
            btn.innerHTML = "<i class='fa-solid fa-cloud-arrow-up'></i> Simpan ke Etalase";
            btn.classList.replace('bg-yellow-600', 'bg-cyan-600');
            btn.classList.replace('hover:bg-yellow-500', 'hover:bg-cyan-500');
            document.getElementById('btn-cancel').classList.add('hidden');
        }

        async function hapusProduk(id) {
            Swal.fire({
                title: 'Hapus Produk?', text: "Data ini tidak bisa dikembalikan!", icon: 'warning',
                showCancelButton: true, confirmButtonColor: '#ef4444', cancelButtonColor: '#64748b', confirmButtonText: 'Ya, Hapus!'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    await db.collection("script").doc(id).delete();
                    Swal.fire('Terhapus!', 'Produk telah dihapus dari etalase.', 'success');
                    loadProduk();
                }
            });
        }

        function loadConfig() {
            const config = JSON.parse(localStorage.getItem('xiroro_config')) || {
                video: "https://raw.githubusercontent.com/xiroro-ab/bab3-sk-kelas9/main/background_2.mp4",
                logo: "https://raw.githubusercontent.com/xiroro-ab/bab3-sk-kelas9/refs/heads/main/20201025_193555.png",
                kolom: "grid-cols-4"
            };
            document.getElementById('cfg-video').value = config.video;
            document.getElementById('cfg-logo').value = config.logo;
            document.getElementById('cfg-kolom').value = config.kolom;
        }

        function simpanConfig() {
            const config = {
                video: document.getElementById('cfg-video').value,
                logo: document.getElementById('cfg-logo').value,
                kolom: document.getElementById('cfg-kolom').value
            };
            localStorage.setItem('xiroro_config', JSON.stringify(config));
            Swal.fire('Tersimpan!', 'Silakan Refresh website utama pembeli.', 'success');
        }
    </script>
</body>
</html>
